# Release to NuGet — tag-triggered, with a human approval gate.
#
# This automates docs/RELEASE-RUNBOOK.md. The runbook's load-bearing
# decisions are PRESERVED, not discarded:
#   * The tag push IS the release decision (runbook Phase 2 HARD STOP) and
#     the `nuget-release` Environment adds a required-reviewer approval
#     BEFORE the irreversible push (nuget.org has no hard delete).
#   * Core is pushed first, then we wait until it is restorable on the
#     flat-container, then the satellites (closes the satellite->core gap).
#   * `--skip-duplicate` makes any re-run idempotent (already-pushed -> 409
#     -> skipped, not aborted).
#   * The published set is exactly the packages whose .csproj <Version>
#     equals the tag — so an additive single-satellite release (Sqlite at
#     7.1.0 while the 6 stay 7.0.0) AND a future lockstep release both work
#     with no edits. This is the documented 6-vs-7 generalization.
#   * `dotnet pack` WITH build (never --no-build — runbook: --no-build has
#     intermittently dropped a satellite .xml).
#
# One-time setup (repo owner):
#   * nuget.org API key scoped "Push new packages and package versions" +
#     Glob `WebReaper*` (runbook Lesson #1: a versions-only / explicit-list
#     key 403s a brand-new ID). Store as repo secret NUGET_API_KEY.
#   * Settings > Environments > `nuget-release` with the owner as a
#     Required reviewer (this is the approval gate).
#
# Dry run: workflow_dispatch with dry_run=true packs + verifies only — no
# push, no release. Use it to validate the pipeline before the real tag.

name: Release (NuGet)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v7.1.0)'
        required: true
      dry_run:
        description: 'Pack + verify only (no push, no GitHub release)'
        type: boolean
        default: true

permissions:
  contents: write

env:
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
  # Explicit, ordered, core FIRST (runbook: "never a glob — ordering/safety").
  # New packages are added here deliberately, like the runbook's explicit set.
  # WebReaper.Cli is intentionally NOT here: PackAsTool=true is incompatible
  # with PublishAot=true on one target, so the CLI ships as a Native-AOT
  # single-binary via GitHub Releases (ADR-0043), not via NuGet. Revisit in a
  # 10.x if there is real consumer demand for the framework-dependent tool.
  # WebReaper.Puppeteer was deleted in v10 (ADR-0053) and replaced by the
  # three transports satellites listed at the bottom of the block. Adding
  # them deliberately, matching the runbook discipline (explicit set, core
  # first, never a glob).
  CANDIDATES: >-
    WebReaper
    WebReaper.Cosmos
    WebReaper.Mongo
    WebReaper.Redis
    WebReaper.AzureServiceBus
    WebReaper.Sqlite
    WebReaper.AI
    WebReaper.Extraction.Attributes
    WebReaper.Extraction.Generators
    WebReaper.Mcp
    WebReaper.Cdp
    WebReaper.Playwright
    WebReaper.Stealth.CloakBrowser

jobs:
  pack:
    name: Build, guardrail & pack (reversible)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.select.outputs.version }}
      packages: ${{ steps.select.outputs.packages }}
      core_selected: ${{ steps.select.outputs.core_selected }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve version + select the package set (effective Version == tag)
        id: select
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          case "$TAG" in
            v*) VERSION="${TAG#v}" ;;
            *) echo "::error::tag '$TAG' must look like v<semver>"; exit 1 ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          selected=""
          core_selected=false
          for p in $CANDIDATES; do
            csproj="$p/$p.csproj"
            [ -f "$csproj" ] || { echo "::error::$csproj missing"; exit 1; }
            # Effective MSBuild Version — resolves Directory.Build.props plus
            # any per-project <Version> override (ADR-0023-wave single source;
            # a satellite overriding it locally is an intentional, visible
            # additive single-satellite release). Not a csproj text grep.
            v=$(dotnet msbuild "$csproj" -getProperty:Version -nologo | tr -d '[:space:]')
            if [ "$v" = "$VERSION" ]; then
              selected="$selected $p"
              [ "$p" = "WebReaper" ] && core_selected=true
            else
              echo "skip $p (effective Version=$v != $VERSION) — released under its own tag"
            fi
          done
          selected="$(echo "$selected" | xargs)"
          if [ -z "$selected" ]; then
            echo "::error::no package has effective Version=$VERSION; nothing matches tag $TAG"
            exit 1
          fi
          echo "Releasing $VERSION: $selected"
          echo "packages=$selected" >> "$GITHUB_OUTPUT"
          echo "core_selected=$core_selected" >> "$GITHUB_OUTPUT"

      - name: Install Native AOT prerequisites
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Release build (must be 0 errors)
        run: dotnet build WebReaper.sln -c Release --nologo

      - name: Guardrail — unit + satellite tests
        run: |
          set -euo pipefail
          for t in $(ls WebReaper.Tests | grep -E '^WebReaper\.(UnitTests|.*\.Tests)$'); do
            csproj="WebReaper.Tests/$t/$t.csproj"
            [ -f "$csproj" ] || continue
            case "$t" in
              WebReaper.IntegrationTests) echo "skip $t (live/flaky — runbook excludes)";;
              *) echo "::group::$t"; dotnet test "$csproj" -c Release --no-build --nologo; echo "::endgroup::";;
            esac
          done

      - name: Guardrail — AOT smoke (zero IL warnings + ALL PASS)
        run: |
          set -euo pipefail
          dotnet publish WebReaper.Tests/WebReaper.AotSmokeTest/WebReaper.AotSmokeTest.csproj \
            -c Release -r linux-x64 --nologo
          ./WebReaper.Tests/WebReaper.AotSmokeTest/bin/Release/net10.0/linux-x64/publish/WebReaper.AotSmokeTest

      - name: Guardrail — dependency-light core (must be empty)
        run: |
          set -euo pipefail
          # ADR-0009: every heavy/native/AOT-dirty dep stays in its satellite.
          # 10.0.0 added the AI-native wave: AI/MCP/source-gen satellites must
          # not leak their packages into core (Microsoft.Extensions.AI*,
          # ModelContextProtocol, Microsoft.CodeAnalysis*).
          out=$(dotnet list WebReaper/WebReaper.csproj package --include-transitive \
            | grep -iE 'newtonsoft|cosmos|mongodb|stackexchange|servicebus|puppeteer|sharpcompress|sqlite|modelcontextprotocol|microsoft\.extensions\.ai|microsoft\.codeanalysis' || true)
          if [ -n "$out" ]; then
            echo "::error::core dependency graph is not light:"; echo "$out"; exit 1
          fi
          echo "core graph clean"

      - name: Pack the selected set (with build — never --no-build)
        run: |
          set -euo pipefail
          rm -rf artifacts && mkdir artifacts
          for p in ${{ steps.select.outputs.packages }}; do
            dotnet pack "$p/$p.csproj" -c Release -o artifacts --nologo
          done

      - name: Verify packed artifacts
        run: |
          set -euo pipefail
          VERSION="${{ steps.select.outputs.version }}"
          set -- ${{ steps.select.outputs.packages }}
          want=$#
          got=$(ls artifacts/*.nupkg 2>/dev/null | wc -l | tr -d ' ')
          [ "$got" = "$want" ] || { echo "::error::expected $want .nupkg, got $got"; exit 1; }
          [ "$(ls artifacts/*.snupkg 2>/dev/null | wc -l | tr -d ' ')" = "0" ] \
            || { echo "::error::unexpected .snupkg"; exit 1; }
          for p in "$@"; do
            f="artifacts/$p.$VERSION.nupkg"
            [ -f "$f" ] || { echo "::error::missing $f"; exit 1; }
            v=$(unzip -p "$f" "$p.nuspec" | grep -oE '<version>[^<]+' | head -1 | sed 's/<version>//')
            [ "$v" = "$VERSION" ] || { echo "::error::$f nuspec version $v != $VERSION"; exit 1; }
          done
          echo "verified $want package(s) at $VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: artifacts/*.nupkg
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Push to NuGet (IRREVERSIBLE — gated)
    needs: pack
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
    runs-on: ubuntu-latest
    environment: nuget-release   # required-reviewer approval gate (runbook Phase 2)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: actions/download-artifact@v4
        with:
          name: nupkgs
          path: artifacts

      - name: Push (core first -> wait for index -> the rest; --skip-duplicate)
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          [ -n "${NUGET_API_KEY:-}" ] || { echo "::error::NUGET_API_KEY secret is empty"; exit 1; }
          VERSION="${{ needs.pack.outputs.version }}"
          PKGS="${{ needs.pack.outputs.packages }}"

          push() {
            dotnet nuget push "artifacts/$1.$VERSION.nupkg" \
              --api-key "$NUGET_API_KEY" --source "$NUGET_SOURCE" --skip-duplicate
          }

          if [ "${{ needs.pack.outputs.core_selected }}" = "true" ]; then
            echo "core first"
            push WebReaper
            echo "waiting for WebReaper $VERSION on the flat-container index"
            for i in $(seq 1 12); do
              if curl -s --max-time 20 \
                https://api.nuget.org/v3-flatcontainer/webreaper/index.json \
                | grep -q "\"$VERSION\""; then echo "indexed"; break; fi
              sleep 30
            done
          fi
          for p in $PKGS; do
            [ "$p" = "WebReaper" ] && continue
            push "$p"
          done

  release:
    name: Verify & GitHub release
    needs: [pack, publish]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Verify every published id is indexed
        run: |
          set -euo pipefail
          VERSION="${{ needs.pack.outputs.version }}"
          for p in ${{ needs.pack.outputs.packages }}; do
            id=$(echo "$p" | tr '[:upper:]' '[:lower:]')
            ok=
            for i in $(seq 1 12); do
              if curl -s --max-time 20 \
                "https://api.nuget.org/v3-flatcontainer/$id/index.json" \
                | grep -q "\"$VERSION\""; then ok=1; break; fi
              sleep 30
            done
            [ -n "$ok" ] && echo "$id $VERSION INDEXED" \
              || { echo "::error::$id $VERSION not indexed"; exit 1; }
          done

      - name: GitHub release from the CHANGELOG section
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${{ needs.pack.outputs.version }}"
          # literal (index-based) section extract; stops at the next "## "
          awk -v v="## $VERSION" 'index($0,v)==1{f=1;print;next} f&&/^## /{exit} f{print}' \
            CHANGELOG.md > /tmp/notes.md
          if [ "$(grep -c '^## ' /tmp/notes.md)" != "1" ]; then
            echo "::error::CHANGELOG has no single '## $VERSION' section"; exit 1
          fi
          # Idempotent: create on first run, update title + notes on re-runs.
          # The runbook's "tag = release decision" stays one-way; this just
          # makes the workflow safe to re-dispatch when downstream steps
          # (cli-publish matrix arms, homebrew-publish) fail and need a retry
          # without forcing a CHANGELOG-or-tag dance.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists; updating title + notes"
            gh release edit "$TAG" --title "WebReaper $VERSION" --notes-file /tmp/notes.md
          else
            echo "creating release $TAG"
            gh release create "$TAG" --verify-tag \
              --title "WebReaper $VERSION" --notes-file /tmp/notes.md
          fi

  cli-publish:
    # ADR-0043: the WebReaper.Cli is intentionally NOT a NuGet package
    # (PackAsTool=true and PublishAot=true are mutually exclusive on one
    # target — RELEASE-RUNBOOK §1.48). The CLI ships as a Native-AOT
    # single-binary attached to each tagged GitHub release; the `release`
    # job above creates the release with CHANGELOG notes, this matrix
    # uploads one prebuilt archive per RID with `--clobber`.
    #
    # Matrix shape — one runner per RID:
    #   * linux-arm64 uses `ubuntu-24.04-arm` (ARM-native, free for
    #     public repos since Jan 2025). The dotnet docs explicitly warn
    #     that linux-x64 → linux-arm64 cross-toolchain is "not documented
    #     or guaranteed by Ubuntu", so we use a native runner instead.
    #   * win-arm64 cross-publishes from `windows-latest` (x64) — the
    #     VS 2022 `VC.Tools.ARM64` component is preinstalled on the
    #     Windows 2025 runner image, which is the documented supported
    #     path.
    #   * osx-x64 and osx-arm64 both cross-publish from `macos-latest` —
    #     Xcode bundles both toolchains, the documented supported path.
    #
    # `fail-fast: false` — one broken RID does NOT abort the others; the
    # release is already created, individual asset upload failures can
    # be re-run by re-dispatching the workflow against the same tag
    # (the `release` job is idempotent because the `release create`
    # there 422s without --clobber, but we run cli-publish gated by the
    # same dry_run check and `gh release upload --clobber` is idempotent
    # for asset re-uploads).
    name: Publish CLI AOT binaries
    needs: [pack, release]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    rid: linux-x64,   archive: tar.gz, ext: ''     }
          - { os: ubuntu-24.04-arm, rid: linux-arm64, archive: tar.gz, ext: ''     }
          - { os: macos-latest,     rid: osx-x64,     archive: zip,    ext: ''     }
          - { os: macos-latest,     rid: osx-arm64,   archive: zip,    ext: ''     }
          - { os: windows-latest,   rid: win-x64,     archive: zip,    ext: '.exe' }
          - { os: windows-latest,   rid: win-arm64,   archive: zip,    ext: '.exe' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Native AOT prerequisites (Linux)
        if: startsWith(matrix.rid, 'linux-')
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: AOT publish ${{ matrix.rid }}
        # `--self-contained true` is redundant with PublishAot=true (which
        # implies self-contained) but the user-spec asked for it explicitly
        # and it makes the intent unambiguous at the call site.
        run: |
          dotnet publish WebReaper.Cli/WebReaper.Cli.csproj \
            -c Release -r ${{ matrix.rid }} \
            --self-contained true -p:PublishAot=true \
            --nologo
        shell: bash

      # ADR-0071: codesign + notarize + staple, macOS arms only. Operates
      # on the publish-output binary (still named WebReaper.Cli at this
      # point); the rename to `webreaper` happens in the next staging step
      # and does not invalidate the signature (Mach-O signatures are
      # content-based, identifier-bound, filename-independent).
      - name: Import Developer ID Application certificate (macOS)
        if: startsWith(matrix.rid, 'osx-')
        uses: apple-actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Codesign + notarize + staple (macOS)
        if: startsWith(matrix.rid, 'osx-')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          APPLE_DEVELOPER_ID: ${{ vars.APPLE_DEVELOPER_ID }}
        shell: bash
        run: |
          set -euo pipefail
          PUB="WebReaper.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish"
          BIN="$PUB/WebReaper.Cli"

          echo "→ codesigning ${BIN}..."
          codesign \
            --sign "$APPLE_DEVELOPER_ID" \
            --options runtime \
            --timestamp \
            --identifier "io.highcraft.webreaper" \
            --force \
            "$BIN"

          echo "→ submitting to Apple notary (notarytool)..."
          # notarytool requires a container (zip or pkg/dmg). The submitted
          # zip is throwaway — the ticket is stapled to the binary itself.
          NOTARIZE_ZIP="$RUNNER_TEMP/notarize-${{ matrix.rid }}.zip"
          (cd "$PUB" && zip -j "$NOTARIZE_ZIP" "$(basename "$BIN")")

          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_NOTARIZATION_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          echo "→ stapling ticket onto binary..."
          xcrun stapler staple "$BIN"

          echo "→ Gatekeeper verification (spctl -a -t exec)..."
          # CI quality gate: a regression that produces a Gatekeeper-rejected
          # binary fails here before reaching a Release asset.
          spctl -a -t exec -vvv "$BIN"

          echo "✓ signed + notarized + stapled"

      - name: Stage + archive (Linux + macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.pack.outputs.version }}"
          RID="${{ matrix.rid }}"
          ARCHIVE="${{ matrix.archive }}"
          PUB="WebReaper.Cli/bin/Release/net10.0/$RID/publish"
          ASSET_BASE="webreaper-v$VERSION-$RID"
          STAGE="$RUNNER_TEMP/$ASSET_BASE"
          mkdir -p "$STAGE"
          # ADR-0043: the published binary is named WebReaper.Cli (assembly
          # name; avoids a case-insensitive macOS clash with the WebReaper
          # library assembly). The shipped binary is renamed to `webreaper`
          # so the agent ergonomic — `./webreaper scrape …` — matches the
          # SKILL.md and README.
          cp "$PUB/WebReaper.Cli" "$STAGE/webreaper"
          chmod +x "$STAGE/webreaper"
          cp LICENSE.txt "$STAGE/LICENSE.txt"
          cp README.md "$STAGE/README.md"
          if [ "$ARCHIVE" = "tar.gz" ]; then
            ASSET="$ASSET_BASE.tar.gz"
            tar -czf "$RUNNER_TEMP/$ASSET" -C "$RUNNER_TEMP" "$ASSET_BASE"
          else
            ASSET="$ASSET_BASE.zip"
            (cd "$RUNNER_TEMP" && zip -r "$ASSET" "$ASSET_BASE")
          fi
          ls -lh "$RUNNER_TEMP/$ASSET"
          echo "ASSET_PATH=$RUNNER_TEMP/$ASSET" >> "$GITHUB_ENV"

      - name: Stage + archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = '${{ needs.pack.outputs.version }}'
          $rid     = '${{ matrix.rid }}'
          $base    = "webreaper-v$version-$rid"
          $pub     = "WebReaper.Cli/bin/Release/net10.0/$rid/publish"
          $stage   = Join-Path $env:RUNNER_TEMP $base
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          # See the bash counterpart above for the WebReaper.Cli → webreaper
          # rename rationale (ADR-0043).
          Copy-Item "$pub/WebReaper.Cli.exe" "$stage/webreaper.exe"
          Copy-Item LICENSE.txt "$stage/LICENSE.txt"
          Copy-Item README.md "$stage/README.md"
          $asset = "$base.zip"
          $assetPath = Join-Path $env:RUNNER_TEMP $asset
          # Compress-Archive is preinstalled; produces a portable .zip.
          Compress-Archive -Path "$stage/*" -DestinationPath $assetPath -Force
          Get-Item $assetPath | Format-List Name,Length
          "ASSET_PATH=$assetPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload to GitHub release (--clobber for idempotent re-run)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          gh release upload "$TAG" "$ASSET_PATH" --clobber

  checksums:
    # ADR-0070 §3: SHA256SUMS Release asset — consumed by scripts/install.sh
    # and by the homebrew-publish job below. Runs after cli-publish has
    # uploaded every per-RID archive; downloads them via `gh release
    # download` so it's robust against partial cli-publish re-runs (only
    # the assets currently on the release are hashed).
    #
    # `fail-fast: false` in cli-publish means an arm can be missing. The
    # manifest reflects "what's on the release right now," which is the
    # correct denotation for the install.sh consumer (a manifest that
    # promises a hash for a file that doesn't exist is worse than a
    # manifest with fewer entries).
    name: SHA256SUMS manifest
    needs: [pack, cli-publish]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Download release archives + compute SHA256SUMS
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          rm -rf checksum-stage && mkdir checksum-stage
          # Download every webreaper-* asset on the release. Skip SHA256SUMS
          # itself so re-runs are idempotent (gh release download won't
          # overwrite the manifest from a prior run before we recompute).
          gh release download "$TAG" --dir checksum-stage --pattern 'webreaper-*'
          cd checksum-stage
          # Sort by filename so output is deterministic across re-runs.
          sha256sum webreaper-* | sort -k2 > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Upload SHA256SUMS as release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          gh release upload "$TAG" checksum-stage/SHA256SUMS --clobber

  homebrew-publish:
    # ADR-0070 §1: render Formula/webreaper.rb from the template in this
    # repo, push to pavlovtech/homebrew-webreaper using a tap-scoped
    # fine-grained PAT (GH_TOKEN_HOMEBREW_TAP). Runs after `checksums`
    # because it reads SHA256 values from SHA256SUMS.
    #
    # Failure here does NOT roll back the GitHub Release or NuGet push
    # (runbook one-way-on-tag). Recovery: re-dispatch the workflow against
    # the same tag once the cause is addressed; the git commit + push is
    # idempotent (skip if no diff in the rendered formula).
    name: Publish to Homebrew tap
    needs: [pack, cli-publish, checksums]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Download SHA256SUMS
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          gh release download "$TAG" --pattern SHA256SUMS --dir .

      - name: Render formula from template
        run: |
          set -euo pipefail
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${{ needs.pack.outputs.version }}"

          # Extract per-RID SHA256 from the manifest.
          sha_osx_arm64=$(awk -v f="webreaper-${TAG}-osx-arm64.zip"     '$2==f{print $1}' SHA256SUMS)
          sha_osx_x64=$(awk   -v f="webreaper-${TAG}-osx-x64.zip"       '$2==f{print $1}' SHA256SUMS)
          sha_linux_x64=$(awk -v f="webreaper-${TAG}-linux-x64.tar.gz"  '$2==f{print $1}' SHA256SUMS)
          sha_linux_arm64=$(awk -v f="webreaper-${TAG}-linux-arm64.tar.gz" '$2==f{print $1}' SHA256SUMS)

          # All four are required — Homebrew formula must have a bottle
          # for every declared `on_macos`/`on_linux` arm. A missing SHA
          # is a release defect, not a publish-time concern.
          for pair in "osx-arm64:$sha_osx_arm64" "osx-x64:$sha_osx_x64" \
                      "linux-x64:$sha_linux_x64" "linux-arm64:$sha_linux_arm64"; do
            rid="${pair%%:*}"
            sha="${pair##*:}"
            if [ -z "$sha" ]; then
              echo "::error::SHA256SUMS missing entry for ${rid} archive at ${TAG}"
              exit 1
            fi
          done

          # Render. `sed -i` is portable enough between GNU + BSD when we
          # avoid the in-place form; here we just write to a new file.
          sed \
            -e "s|{{VERSION}}|${VERSION}|g" \
            -e "s|{{TAG}}|${TAG}|g" \
            -e "s|{{SHA256_OSX_ARM64}}|${sha_osx_arm64}|g" \
            -e "s|{{SHA256_OSX_X64}}|${sha_osx_x64}|g" \
            -e "s|{{SHA256_LINUX_X64}}|${sha_linux_x64}|g" \
            -e "s|{{SHA256_LINUX_ARM64}}|${sha_linux_arm64}|g" \
            homebrew/webreaper.rb.template > webreaper.rb.full

          # Strip the leading template-header comment block (the
          # developer-facing prose about placeholders + render shape).
          # The tap repo's formula stays clean — formula begins at `class`.
          awk '/^class / { found=1 } found { print }' webreaper.rb.full > webreaper.rb

          echo "--- rendered Formula/webreaper.rb ---"
          cat webreaper.rb

      - name: Push to pavlovtech/homebrew-webreaper
        env:
          GH_TOKEN_HOMEBREW_TAP: ${{ secrets.GH_TOKEN_HOMEBREW_TAP }}
        run: |
          set -euo pipefail
          [ -n "${GH_TOKEN_HOMEBREW_TAP:-}" ] \
            || { echo "::error::GH_TOKEN_HOMEBREW_TAP secret is empty"; exit 1; }
          VERSION="${{ needs.pack.outputs.version }}"

          git clone --depth 1 \
            "https://x-access-token:${GH_TOKEN_HOMEBREW_TAP}@github.com/pavlovtech/homebrew-webreaper.git" \
            tap
          mkdir -p tap/Formula
          cp webreaper.rb tap/Formula/webreaper.rb

          cd tap
          git config user.name "webreaper-release-bot"
          git config user.email "webreaper-release-bot@users.noreply.github.com"
          git add Formula/webreaper.rb
          # Idempotent re-run: nothing to do if the rendered formula is
          # byte-identical to what's already in the tap.
          if git diff --staged --quiet; then
            echo "no changes — formula already up to date"
            exit 0
          fi
          git commit -m "WebReaper ${VERSION}"
          git push
